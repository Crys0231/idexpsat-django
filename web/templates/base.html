<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEXPSAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#1e293b', secondary: '#0f172a', accent: '#38bdf8' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body class="bg-secondary text-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-primary border-r border-gray-700 flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-gray-700">
            <h1 class="text-xl font-bold text-accent tracking-widest">IDEXPSAT</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-2 rounded transition hover:bg-gray-700 text-gray-300">📊 Dashboard</a>
            <a href="/importacao/" class="block px-4 py-2 rounded bg-gray-700 text-white font-semibold">📁 Importar
                CSV</a>
            <a href="#" class="block px-4 py-2 rounded transition hover:bg-gray-700 text-gray-300">👥 Clientes NPS</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
