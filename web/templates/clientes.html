{% extends 'base.html' %}

{% block content %}
<div class="space-y-8">
    <div class="flex justify-between items-center">
        <h2 class="text-3xl font-bold text-white tracking-wide">Fila de Atendimento NPS</h2>
        <span class="text-sm text-gray-400">Atualizado agora mesmo</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-primary p-6 rounded-xl border border-gray-700 shadow-md">
            <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Total de Pesquisas</p>
            <p class="text-3xl font-bold text-white mt-2">{{ metricas.total }}</p>
        </div>
        <div class="bg-primary p-6 rounded-xl border border-gray-700 shadow-md border-l-4 border-l-green-500">
            <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Respondidas</p>
            <p class="text-3xl font-bold text-green-400 mt-2">{{ metricas.respondidas }}</p>
        </div>
        <div class="bg-primary p-6 rounded-xl border border-gray-700 shadow-md border-l-4 border-l-amber-500">
            <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Casos Críticos / Pendentes</p>
            <p class="text-3xl font-bold text-amber-400 mt-2">{{ metricas.criticos }}</p>
        </div>
    </div>

    <div
        class="bg-primary p-4 rounded-xl border border-gray-700 flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="w-full md:w-1/3 relative">
            <input type="text" name="busca" placeholder="Buscar por nome, telefone ou placa..." value="{{ busca }}"
                class="w-full bg-secondary border border-gray-600 rounded-lg pl-10 pr-4 py-2 text-white focus:outline-none focus:border-accent"
                hx-get="{% url 'crm_clientes' %}" hx-trigger="keyup changed delay:300ms" hx-target="#tabela-container"
                hx-include="[name='marca_id'], [name='status']">
            <span class="absolute left-3 top-2.5 text-gray-500">🔍</span>
        </div>

        <div class="flex gap-4 w-full md:w-auto">
            <select name="marca_id"
                class="bg-secondary border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-accent"
                hx-get="{% url 'crm_clientes' %}" hx-trigger="change" hx-target="#tabela-container"
                hx-include="[name='busca'], [name='status']">
                <option value="">Todas as Marcas</option>
                {% for marca in marcas %}
                <option value="{{ marca.id }}" {% if marca.id|stringformat:"s"==marca_selected %}selected{% endif %}>{{
                    marca.nome }}</option>
                {% endfor %}
            </select>

            <input type="hidden" name="status" id="status-input" value="{{ status_selecionado }}">
        </div>
    </div>

    <div id="tabela-container" class="bg-primary rounded-xl border border-gray-700 overflow-hidden shadow-xl">
        {% include 'partials/tabela_clientes.html' %}
    </div>
</div>

<script>
    function copiarScriptWhatsapp(nome, telefone, tipoPesquisa) {
        // Formata a palavra dinamicamente com base no tipo da pesquisa
        const profissional = tipoPesquisa.toLowerCase().includes('venda') && !tipoPesquisa.toLowerCase().includes('pos') ? 'vendedor' : 'consultor';

        const texto = `Olá, ${nome}! Tudo bem?\n\nVi que você realizou um serviço conosco recentemente. Poderia nos avaliar respondendo à nossa pesquisa rápida? Leva menos de 1 minuto e nos ajuda a entender como foi o atendimento do seu ${profissional}.`;

        navigator.clipboard.writeText(texto).then(() => {
            alert(`Script copiado para ${nome}! Agora é só colar no WhatsApp.`);
        }).catch(err => {
            console.error('Erro ao copiar texto: ', err);
        });
    }
</script>
{% endblock %}
